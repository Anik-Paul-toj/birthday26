    <script>
      window.Motion = window.FramerMotion || window.Motion || {};

      if (!window.Motion.motion && window.React) {
        const strippedMotionProps = new Set([
          "initial",
          "animate",
          "whileInView",
          "whileHover",
          "whileTap",
          "exit",
          "variants",
          "layout",
          "viewport",
          "transition",
        ]);

        window.Motion.motion = new Proxy(
          {},
          {
            get: function (_, tag) {
              return React.forwardRef(function MotionFallback(props, ref) {
                const cleanProps = {};

                Object.keys(props || {}).forEach(function (key) {
                  if (!strippedMotionProps.has(key)) {
                    cleanProps[key] = props[key];
                  }
                });

                return React.createElement(tag, { ...cleanProps, ref: ref });
              });
            },
          }
        );
      }

    <script type="text/babel">
      const { motion } = window.Motion;

      const entrance = (delay = 0) => ({
        initial: { filter: "blur(10px)", opacity: 0, y: 20 },
        whileInView: { filter: "blur(0px)", opacity: 1, y: 0 },
        viewport: { once: true, amount: 0.2 },
        transition: { duration: 0.7, ease: "easeOut", delay },
      });

      const cinematicEase = (t) =>
        t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      const smoothScrollTo = (targetId) => {
        const target = document.getElementById(targetId);
        if (!target) return;

        const startY = window.scrollY;
        const targetY = target.getBoundingClientRect().top + window.scrollY;
        const distance = targetY - startY;
        const duration = Math.min(1500, Math.max(800, Math.abs(distance) * 0.7));
        const startedAt = performance.now();

        const step = (now) => {
          const progress = Math.min((now - startedAt) / duration, 1);
          window.scrollTo(0, startY + distance * cinematicEase(progress));

          if (progress < 1) {
            requestAnimationFrame(step);
          }
        };

        requestAnimationFrame(step);
      };

      const moveReactiveCard = (event) => {
        const card = event.currentTarget;
        const rect = card.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width - 0.5;
        const y = (event.clientY - rect.top) / rect.height - 0.5;

        card.style.setProperty("--tilt-x", `${x * 7}deg`);
        card.style.setProperty("--tilt-y", `${y * -7}deg`);
      };

      const resetReactiveCard = (event) => {
        const card = event.currentTarget;
        card.style.setProperty("--tilt-x", "0deg");
        card.style.setProperty("--tilt-y", "0deg");
      };

      window.motion = motion;
      window.entrance = entrance;
      window.smoothScrollTo = smoothScrollTo;
      window.moveReactiveCard = moveReactiveCard;
      window.resetReactiveCard = resetReactiveCard;
    </script>

    <script type="text/babel">
      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      const FadingVideo = ({ src, className = "", style = {} }) => {
        const videoRef = React.useRef(null);
        const rafRef = React.useRef(null);
        const fadingOutRef = React.useRef(false);
        const loopTimeoutRef = React.useRef(null);

        const fadeTo = React.useCallback((target, duration = FADE_MS) => {
          const video = videoRef.current;
          if (!video) return;

          if (rafRef.current) {
            cancelAnimationFrame(rafRef.current);
          }

          const currentOpacity = parseFloat(video.style.opacity);
          const startOpacity = Number.isFinite(currentOpacity)
            ? currentOpacity
            : 0;
          const start = performance.now();

          const step = (now) => {
            const progress = Math.min((now - start) / duration, 1);
            const nextOpacity =
              startOpacity + (target - startOpacity) * progress;

            video.style.opacity = String(nextOpacity);

            if (progress < 1) {
              rafRef.current = requestAnimationFrame(step);
            } else {
              video.style.opacity = String(target);
              rafRef.current = null;
            }
          };

          rafRef.current = requestAnimationFrame(step);
        }, []);

        React.useEffect(() => {
          const video = videoRef.current;
          if (!video) return undefined;

          const playVideo = () => {
            const promise = video.play();
            if (promise && promise.catch) {
              promise.catch(() => {});
            }
          };

          const handleLoadedData = () => {
            video.style.opacity = "0";
            fadingOutRef.current = false;
            playVideo();
            fadeTo(1);
          };

          const handleTimeUpdate = () => {
            if (!Number.isFinite(video.duration)) return;

            const remaining = video.duration - video.currentTime;
            if (
              !fadingOutRef.current &&
              remaining <= FADE_OUT_LEAD &&
              remaining > 0
            ) {
              fadingOutRef.current = true;
              fadeTo(0);
            }
          };

          const handleEnded = () => {
            video.style.opacity = "0";

            if (loopTimeoutRef.current) {
              clearTimeout(loopTimeoutRef.current);
            }

            loopTimeoutRef.current = setTimeout(() => {
              video.currentTime = 0;
              playVideo();
              fadingOutRef.current = false;
              fadeTo(1);
            }, 100);
          };

          video.addEventListener("loadeddata", handleLoadedData);
          video.addEventListener("timeupdate", handleTimeUpdate);
          video.addEventListener("ended", handleEnded);

          if (video.readyState >= 2) {
            handleLoadedData();
          }

          return () => {
            if (rafRef.current) {
              cancelAnimationFrame(rafRef.current);
            }

            if (loopTimeoutRef.current) {
              clearTimeout(loopTimeoutRef.current);
            }

            video.removeEventListener("loadeddata", handleLoadedData);
            video.removeEventListener("timeupdate", handleTimeUpdate);
            video.removeEventListener("ended", handleEnded);
          };
        }, [src, fadeTo]);

        return (
          <video
            ref={videoRef}
            src={src}
            autoPlay
            muted
            playsInline
            preload="auto"
            className={`fading-video ${className}`}
            style={{ ...style, opacity: 0 }}
          />
        );
      };

      window.FadingVideo = FadingVideo;
    </script>

    <script type="text/babel">
      const BlurText = ({ text, className = "" }) => {
        const rootRef = React.useRef(null);
        const [visible, setVisible] = React.useState(false);
        const words = text.split(" ");

        React.useEffect(() => {
          const node = rootRef.current;
          if (!node) return undefined;

          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setVisible(true);
                observer.disconnect();
              }
            },
            { threshold: 0.1 }
          );

          observer.observe(node);

          return () => observer.disconnect();
        }, []);

        return (
          <p
            ref={rootRef}
            className={`${className} flex flex-wrap`}
            style={{ justifyContent: "center", rowGap: "0.1em" }}
          >
            {words.map((word, index) => (
              <motion.span
                key={`${word}-${index}`}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  visible
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : undefined
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: (index * 100) / 1000,
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {word}
              </motion.span>
            ))}
          </p>
        );
      };

      window.BlurText = BlurText;
    </script>

        "assets/videos/AQMTk8ubdmSOJdBet9F0lA7JgKeEBZSWCSBToF890s25CiSEWCBA1nwGo5bt0UyS57JrmsJHuyZxFGgfWZMfXxO3fMqwg_XBX5wdP98.mp4";

      const LoveStoryVideo = () => {
        const videoRef = React.useRef(null);

        React.useEffect(() => {
          const video = videoRef.current;
          if (!video) return undefined;

          const playVideo = () => {
            video.muted = false;
            const promise = video.play();
            if (promise && promise.catch) {
              promise.catch(() => {});
            }
          };

          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                playVideo();
                return;
              }

              video.pause();
            },
            { threshold: 0.45 }
          );

          const handleCanPlay = () => {
            const rect = video.getBoundingClientRect();
            const isVisible =
              rect.top < window.innerHeight * 0.75 &&
              rect.bottom > window.innerHeight * 0.25;

            if (isVisible) {
              playVideo();
            }
          };

          observer.observe(video);
          video.addEventListener("canplay", handleCanPlay);

          return () => {
            observer.disconnect();
            video.removeEventListener("canplay", handleCanPlay);
          };
        }, []);

        return (
          <video
            ref={videoRef}
            src={LOVE_LETTER_VIDEO}
            autoPlay
            loop
            playsInline
            preload="auto"
            controls
            className="mx-auto block max-h-[58svh] w-auto max-w-full rounded-[1rem]"
          />
        );
      };

      const TypewriterLetter = () => {
        const [started, setStarted] = React.useState(false);
        const [lineIndex, setLineIndex] = React.useState(0);
        const [charIndex, setCharIndex] = React.useState(0);
        const ref = React.useRef(null);

        React.useEffect(() => {
          const node = ref.current;
          if (!node) return undefined;

          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setStarted(true);
                observer.disconnect();
              }
            },
            { threshold: 0.35 }
          );

          observer.observe(node);
          return () => observer.disconnect();
        }, []);

        React.useEffect(() => {
          if (!started || lineIndex >= letterLines.length) return undefined;

          const currentLine = letterLines[lineIndex];
          const timer = setTimeout(() => {
            if (charIndex < currentLine.length) {
              setCharIndex((current) => current + 1);
            } else {
              setTimeout(() => {
                setLineIndex((current) => current + 1);
                setCharIndex(0);
              }, 420);
            }
          }, charIndex === 0 ? 220 : 34);

          return () => clearTimeout(timer);
        }, [started, lineIndex, charIndex]);

        return (
          <div ref={ref} className="min-h-[15rem] font-body text-base font-light leading-relaxed text-white/90 md:text-lg">
            {letterLines.map((line, index) => {
              const visible =
                index < lineIndex
                  ? line
                  : index === lineIndex
                    ? line.slice(0, charIndex)
                    : "";

              return (
                <p key={line} className="mb-4">
                  {visible}
                  {index === lineIndex && lineIndex < letterLines.length && (
                    <span className="typewriter-cursor" />
                  )}
                </p>
              );
            })}
          </div>
        );

      const LoadingScreen = () => {
        const [progress, setProgress] = React.useState(0);
        const [hidden, setHidden] = React.useState(false);

        React.useEffect(() => {
          let frameId;
          const startedAt = performance.now();

          const step = (now) => {
            const nextProgress = Math.min(100, Math.round(((now - startedAt) / 1800) * 100));
            setProgress(nextProgress);

            if (nextProgress < 100) {
              frameId = requestAnimationFrame(step);
            } else {
              setTimeout(() => setHidden(true), 520);
            }
          };

          frameId = requestAnimationFrame(step);
          return () => cancelAnimationFrame(frameId);
        }, []);

        if (hidden) return null;

        return (
          <motion.div
            initial={{ opacity: 1 }}
            animate={{ opacity: progress >= 100 ? 0 : 1 }}
            transition={{ duration: 0.65, ease: "easeOut" }}

            setPlaying(false);

        const targetRef = React.useRef({ x: -100, y: -100, scale: 1 });
        const currentRef = React.useRef({ x: -100, y: -100, scale: 1 });
        const trailRef = React.useRef(
          Array.from({ length: 6 }).map(() => ({ x: -100, y: -100, opacity: 0 }))
        );

        React.useEffect(() => {
          const handleMouseMove = (event) => {
            targetRef.current.x = event.clientX;
            targetRef.current.y = event.clientY;
          };

          const handlePointerOver = (event) => {
            const closestInteractive = event.target.closest
              ? event.target.closest(
              "button, a, [role='button'], .interactive-glow"
                )
              : null;

            targetRef.current.scale = closestInteractive
              ? 1.9
              : 1;
          };

          let frameId;
          const animate = () => {
            const target = targetRef.current;
            const current = currentRef.current;
            current.x += (target.x - current.x) * 0.18;
            current.y += (target.y - current.y) * 0.18;
            current.scale += (target.scale - current.scale) * 0.22;

            if (cursorRef.current) {
              cursorRef.current.style.setProperty("--cursor-x", `${current.x}px`);
              cursorRef.current.style.setProperty("--cursor-y", `${current.y}px`);
              cursorRef.current.style.setProperty("--cursor-scale", current.scale);
            }

            trailRef.current.forEach((point, index) => {
              const follow = index === 0 ? current : trailRef.current[index - 1];
              point.x += (follow.x - point.x) * (0.12 + index * 0.018);
              point.y += (follow.y - point.y) * (0.12 + index * 0.018);
              point.opacity = Math.max(0, 0.42 - index * 0.055);

              const node = particleRefs.current[index];
              if (node) {
                node.style.setProperty("--particle-x", `${point.x}px`);
                node.style.setProperty("--particle-y", `${point.y}px`);
                node.style.setProperty("--particle-opacity", point.opacity);
              }
            });

            frameId = requestAnimationFrame(animate);
          };

          window.addEventListener("mousemove", handleMouseMove);
          window.addEventListener("pointerover", handlePointerOver);
          frameId = requestAnimationFrame(animate);

          return () => {
            window.removeEventListener("mousemove", handleMouseMove);
            window.removeEventListener("pointerover", handlePointerOver);
            cancelAnimationFrame(frameId);
          };
        }, []);

              <span

                ref={(node) => {

      const CountdownGate = ({ onComplete }) => {

          const audio = audioRef.current;
          if (!audio) return;

          audio.muted = false;
          audio.volume = 0.5;
          const promise = audio.play();

          if (promise && promise.then) {
            promise
              .then(() => {
                setAudioPlaying(true);
              })
              .catch(() => {
                setAudioPlaying(false);
                return;
              });
          } else if (!audio.paused) {
            setAudioPlaying(true);
          }
        }, []);

        React.useEffect(() => {
          playCountdownAudio(false);

          const timer = setInterval(() => {
            const next = getCountdownParts();
            setRemaining(next);

            if (next.total <= 0) {
              clearInterval(timer);

              if (audioRef.current) {
                audioRef.current.pause();
              }

              setTimeout(onComplete, 700);
            }
          }, 250);
          const retryTimer = setTimeout(() => playCountdownAudio(true), 650);

          const unlockAudio = () => {
            playCountdownAudio(true);
          };

          const retryWhenVisible = () => {
            if (!document.hidden) {
              playCountdownAudio(true);
            }
          };

          const audio = audioRef.current;
          audio?.addEventListener("loadeddata", unlockAudio);
          audio?.addEventListener("canplay", unlockAudio);
          document.addEventListener("visibilitychange", retryWhenVisible);
          window.addEventListener("pointerdown", unlockAudio, true);
          window.addEventListener("touchstart", unlockAudio, true);
          window.addEventListener("click", unlockAudio, true);
          window.addEventListener("keydown", unlockAudio, true);

            window.removeEventListener("keydown", unlockAudio, true);

            if (audioRef.current) {

        const submitPin = (candidate = pin) => {
          if (candidate.length !== 6) {
            setError("Enter the six-star code.");

          }

          if (hashPin(candidate) === PASSWORD_HASH) {
            setError("");
            onUnlock();
            return;
          }

          setError("That universe is still locked.");
          setPin("");
        };

        const pressDigit = (digit) => {
          setError("");

          setCountdownDone(true);
        };

        const unlockSite = () => {
          sessionStorage.setItem("birthday-unlocked", "true");
          setUnlocked(true);
        };

        if (!countdownDone) {
          return <CountdownGate onComplete={finishCountdown} />;
        }

        if (!unlocked) {
          return <PasswordGate onUnlock={unlockSite} />;
        }

        return (
          <main className="bg-black font-body text-white">
            <LoadingScreen />
            <Navbar />
            <CustomCursor />
          <MusicPlayer />
          <Hero />
          <MemoriesGallery />
          <Capabilities />
          <LoveLetter />
          <FinalSurprise />
          </main>
        );
      };

      window.App = App;

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
